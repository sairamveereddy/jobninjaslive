# Netlify config for jobNinjas.live frontend
[build]
  publish = "."

# Proxy /api/* to Railway backend so the frontend can call same-origin /api/...
[[redirects]]
  from = "/api/*"
  to = "https://jobninjaslive-production.up.railway.app/api/:splat"
  status = 200
  force = true

# Proxy auth routes to backend (Google OAuth, etc.)
[[redirects]]
  from = "/auth/*"
  to = "https://jobninjaslive-production.up.railway.app/auth/:splat"
  status = 200
  force = true

# Proxy payments (checkout, webhook, status) to backend
[[redirects]]
  from = "/payments/*"
  to = "https://jobninjaslive-production.up.railway.app/payments/:splat"
  status = 200
  force = true

# Proxy admin API to backend (stats, users, payments, scrape)
[[redirects]]
  from = "/admin/*"
  to = "https://jobninjaslive-production.up.railway.app/admin/:splat"
  status = 200
  force = true

